# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-macos:
    runs-on: macos-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Update Brew
      run: brew update && brew install qt openssl@3

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -S ${{ github.workspace }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_POLICY_VERSION_MINIMUM=3.5

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Make Distrution Directory
      run: >
        mkdir -p ${{ github.workspace }}/dist && 
        cp ${{ steps.strings.outputs.build-output-dir }}/Runes ${{ github.workspace }}/dist/Runes &&
        cp -R ${{ steps.strings.outputs.build-output-dir }}/Resources ${{ github.workspace }}/dist/Resources

    - uses: actions/upload-artifact@v4
      with:
        name: Runes-${{ matrix.build_type }}-macOS
        path: dist/*
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}\\build" >> "$GITHUB_OUTPUT"

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.9.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        dir: '${{ github.workspace }}/qt/'

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -S ${{ github.workspace }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Make Distrution Directory
      run: |
        mkdir -p ${{ github.workspace }}\dist
        mkdir -p ${{ github.workspace }}\dist\Resources
        xcopy "${{ steps.strings.outputs.build-output-dir }}\${{ matrix.build_type }}\Resources\" "${{ github.workspace }}\dist\Resources\" /s /e
        copy "${{ steps.strings.outputs.build-output-dir }}\${{ matrix.build_type }}\Runes.exe" "${{ github.workspace }}\dist\Runes.exe"

    - uses: actions/upload-artifact@v4
      with:
        name: Runes-${{ matrix.build_type }}-Windows
        path: dist/*
        if-no-files-found: error